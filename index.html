<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">TREZOR — Interaktivní učení slovíček — 10+ jazykových modulů</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            min-height: -webkit-fill-available;
            color: #ffffff;
        }

        .main-container {
            display: flex;
            width: 100%;
            min-height: 100vh;
            gap: 20px;
            padding: 20px;
            box-sizing: border-box;
        }

        /* iOS Safari: ensure content is scrollable and not clipped */
        @supports (-webkit-touch-callout: none) {
            .main-container {
                min-height: -webkit-fill-available;
            }
            .vocabulary-table-container {
                max-height: none;
                overflow-y: visible;
            }
            .left-section {
                overflow: visible;
            }
        }

        .left-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow: visible;
        }

        .right-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            flex-direction: column;
            gap: 20px;
        }

        .app-title {
            font-size: 48px;
            color: #ecf0f1;
            margin: 0 0 10px 0;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
        }

        .app-subtitle {
            font-size: 18px;
            color: #d0d3ff;
            margin: 0 0 30px 0;
            text-align: center;
        }

        .hero-czech {
            font-size: clamp(17px, 2.4vw, 26px);
            font-weight: 800;
            color: #f4e7d7;
            text-align: center;
            margin: 0 0 16px 0;
            line-height: 1.35;
            letter-spacing: 0.02em;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.45);
            max-width: 920px;
        }

        .lang-switcher {
            display: flex;
            flex-wrap: nowrap;
            justify-content: center;
            align-items: center;
            gap: 4px;
            margin: 0 0 24px 0;
            padding: 0 4px 6px;
            max-width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
        }

        .voice-selector-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: -16px 0 20px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .voice-selector-label {
            font-size: 12px;
            color: #d0d3ff;
            white-space: nowrap;
        }

        .voice-selector-select {
            font-size: 12px;
            padding: 3px 8px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.3);
            color: #ecf0f1;
            cursor: pointer;
            max-width: 220px;
        }

        .voice-selector-select option {
            background: #1a1a2e;
            color: #ecf0f1;
        }

        .lang-switcher::-webkit-scrollbar {
            height: 4px;
        }

        .lang-switcher::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.25);
            border-radius: 4px;
        }

        .lang-btn {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            padding: 4px 7px;
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.25);
            color: #ecf0f1;
            font-size: clamp(10px, 1.65vw, 12px);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s, transform 0.15s;
            flex-shrink: 0;
            white-space: nowrap;
            line-height: 1.2;
        }

        .lang-btn img {
            display: inline-block;
            vertical-align: middle;
            border-radius: 2px;
            flex-shrink: 0;
        }

        .lang-btn:hover {
            border-color: #3498db;
            background: rgba(52, 152, 219, 0.2);
            transform: translateY(-1px);
        }

        .lang-btn.active {
            border-color: #27ae60;
            background: rgba(39, 174, 96, 0.35);
            box-shadow: 0 0 0 1px rgba(39, 174, 96, 0.45);
        }

        .instructions {
            background: #e8f4f8;
            border-left: 4px solid #3498db;
            padding: 15px 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            width: 100%;
            max-width: 900px;
            color: #2c3e50;
        }

        .instructions p {
            margin: 5px 0;
            font-size: 14px;
            color: #2c3e50;
        }

        .vocabulary-panel {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 16px;
            padding: 16px 16px 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 900px;
            overflow: visible;
        }

        .vocabulary-table-container {
            width: 100%;
            max-height: 70vh;
            overflow-y: auto;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            background: white;
            -webkit-overflow-scrolling: touch;
        }

        .vocabulary-table-container::-webkit-scrollbar {
            width: 10px;
        }

        .vocabulary-table-container::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .vocabulary-table-container::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #3498db, #2980b9);
            border-radius: 10px;
        }

        .vocabulary-table-container::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #2980b9, #21618c);
        }

        .vocabulary-table {
            width: 100%;
            background: white;
            border-radius: 12px;
            overflow: hidden;
        }

        .vocab-header {
            display: flex;
            background: #3498db;
            color: white;
            font-weight: bold;
            font-size: 14px;
        }

        .vocab-row {
            display: flex;
            align-items: stretch;
            border-bottom: 1px solid #ecf0f1;
            background: white;
        }

        .vocab-row:last-child {
            border-bottom: none;
        }

        .vocab-col-foreign {
            flex: 47;
            padding: 10px 8px;
            min-width: 0;
        }

        .vocab-col-czech {
            flex: 47;
            padding: 10px 8px;
            min-width: 0;
            border-left: 1px solid rgba(255,255,255,0.2);
        }

        .vocab-header .vocab-col-czech {
            border-left: 1px solid rgba(255,255,255,0.3);
        }

        .vocab-col-del {
            flex: 0 0 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
        }

        .vocabulary-table input {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px; /* min 16px prevents iOS auto-zoom */
            line-height: 1.4;
            transition: border-color 0.3s;
            box-sizing: border-box;
            -webkit-appearance: none;
            appearance: none;
            background: white;
            color: #333;
            display: block;
            touch-action: manipulation;
        }

        .vocabulary-table input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .vocabulary-table input::placeholder {
            color: #999;
            font-size: 13px;
        }

        .remove-row {
            background: transparent;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 5px;
            transition: transform 0.2s, filter 0.2s;
        }

        .remove-row:hover {
            transform: scale(1.2);
            filter: brightness(0.8);
        }

        .table-controls {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
            align-items: center;
        }

        .add-row-button {
            padding: 10px 20px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            width: auto;
        }

        .add-row-button:hover:not(:disabled) {
            background: #229954;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .add-row-button:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }

        .row-counter {
            font-size: 13px;
            color: #d0d3ff;
            margin-top: 5px;
        }

        .paste-hint {
            margin-top: -5px;
            font-size: 12px;
            color: #d0d3ff;
            text-align: center;
            opacity: 0.9;
        }

        .start-game-button {
            padding: 15px 40px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            width: auto;
        }

        .start-game-button:disabled {
            background: #95a5a6;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .start-game-button:hover:not(:disabled) {
            background: #229954;
            transform: scale(1.03);
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
        }

        .validation-message {
            font-size: 13px;
            margin-top: 8px;
        }

        .validation-message.error {
            color: #e74c3c;
        }

        .validation-message.success {
            color: #27ae60;
        }

        /* TREZOR A ZÁMKY */
        .safe-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: clamp(320px, 60vw, 600px);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
        }

        #safe {
            width: clamp(220px, 75vw, 400px);
            height: clamp(280px, 65vw, 500px);
            background: linear-gradient(145deg, #434343, #2d2d2d);
            border-radius: 15px;
            box-shadow: 
                0 20px 40px rgba(0,0,0,0.5),
                inset 0 2px 0 rgba(255,255,255,0.1),
                inset 0 -2px 0 rgba(0,0,0,0.3);
            position: relative;
            border: 3px solid #1a1a1a;
            z-index: 1;
            isolation: isolate;
        }

        .safe-door {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #434343, #2d2d2d);
            border-radius: 15px;
            transform-origin: left center;
            transition: transform 2s ease-in-out;
            border: 3px solid #1a1a1a;
            box-shadow: 
                0 20px 40px rgba(0,0,0,0.5),
                inset 0 2px 0 rgba(255,255,255,0.1),
                inset 0 -2px 0 rgba(0,0,0,0.3);
            z-index: 1;
        }

        .safe-door.open {
            transform: perspective(1200px) rotateY(-105deg);
        }

        .safe-handle {
            position: absolute;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, #888, #555);
            border-radius: 50%;
            box-shadow: 
                0 4px 8px rgba(0,0,0,0.5),
                inset 0 2px 4px rgba(255,255,255,0.3);
        }

        .safe-interior {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            background: linear-gradient(135deg, #1a1a1a, #2d2d2d);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 1s ease 1.5s;
        }

        .safe-door.open ~ .safe-interior {
            opacity: 1;
        }

        /* PERGAMEN — fullscreen overlay, funguje na všech zařízeních */
        .scroll-container {
            display: none; /* skryto, zobrazí se JS */
        }

        .scroll-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: 9999;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            animation: overlay-fade-in 0.5s ease forwards;
            /* Force new stacking context above everything */
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
        }

        @keyframes overlay-fade-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .scroll {
            width: 100%;
            max-width: 680px;
            background: linear-gradient(to bottom, #f4e7d7, #e8d7c3);
            border: 2px solid #c9a961;
            border-radius: 8px;
            padding: clamp(20px, 5vw, 40px) clamp(15px, 4vw, 30px);
            box-shadow: 
                0 10px 30px rgba(0,0,0,0.5),
                inset 0 0 20px rgba(194, 154, 108, 0.2);
            transform-origin: top center;
            animation: scroll-unroll 0.8s ease 0.3s both;
            position: relative;
            margin: auto;
        }

        @keyframes scroll-unroll {
            0% { transform: scaleY(0); opacity: 0; }
            100% { transform: scaleY(1); opacity: 1; }
        }

        .scroll::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 30px;
            background: linear-gradient(to bottom, 
                rgba(139, 90, 43, 0.3),
                transparent);
            border-radius: 8px 8px 0 0;
        }

        .scroll-content {
            opacity: 0;
            animation: fade-in 0.5s ease 1s forwards;
            color: #3d2817;
        }

        @keyframes fade-in {
            to { opacity: 1; }
        }

        .scroll-title {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
            color: #8b5a2b;
            font-family: 'Georgia', serif;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .scroll-subtitle {
            font-size: 14px;
            text-align: center;
            margin-bottom: 25px;
            color: #6b4423;
            font-style: italic;
        }

        .scroll-words {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #c9a961;
        }

        .scroll-words h3 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #8b5a2b;
            font-family: 'Georgia', serif;
            text-align: center;
        }

        /* Excel-like tabulka pro kopírování */
        .excel-table {
            margin: 20px auto;
            max-width: 500px;
            border: 2px solid #8b5a2b;
            border-radius: 4px;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        .excel-header {
            display: grid;
            grid-template-columns: 48px 1fr 1fr;
            background: #8b5a2b;
            color: #f4e7d7;
            font-weight: bold;
        }

        .excel-row {
            display: grid;
            grid-template-columns: 48px 1fr 1fr;
            border-top: 1px solid #c9a961;
        }

        .excel-cell-speak {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px 4px !important;
        }

        .speak-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            padding: 0;
            border: 2px solid #8b5a2b;
            border-radius: 8px;
            background: #f4e7d7;
            color: #6b4423;
            font-size: 18px;
            line-height: 1;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
        }

        .speak-btn:hover {
            background: #fff;
            transform: scale(1.06);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
        }

        .speak-btn:active {
            transform: scale(0.98);
        }

        .speak-btn:focus-visible {
            outline: 2px solid #27ae60;
            outline-offset: 2px;
        }

        .excel-row:hover {
            background: rgba(139, 90, 43, 0.1);
        }

        .excel-cell {
            padding: 10px 15px;
            border-right: 1px solid #c9a961;
            text-align: left;
            user-select: text;
        }

        .excel-cell:last-child {
            border-right: none;
        }

        .copy-hint {
            text-align: center;
            font-size: 12px;
            color: #6b4423;
            margin-top: 10px;
            font-style: italic;
        }

        .copy-button {
            display: block;
            margin: 15px auto 10px;
            padding: 10px 20px;
            background: #27ae60;
            color: white;
            border: 2px solid #229954;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .copy-button:hover {
            background: #229954;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        /* Kontejner pro tlačítka */
        .button-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .scroll-button {
            padding: 12px 25px;
            color: #f4e7d7;
            border: 2px solid #6b4423;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            flex: 0 1 auto;
            min-width: 200px;
        }

        .repeat-button {
            background: #3498db;
            border-color: #2980b9;
        }

        .repeat-button:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .new-button {
            background: #27ae60;
            border-color: #229954;
        }

        .new-button:hover {
            background: #229954;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .lock {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 18px;
            color: white;
            transition: all 0.5s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .lock.locked {
            background: #e74c3c;
        }

        .lock.unlocked {
            background: #27ae60;
            animation: unlock-pop 0.5s ease;
        }

        @keyframes unlock-pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        /* ===== HERNÍ PANEL ===== */
        .game-panel {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 100%;
            text-align: center;
            animation: slideInRight 0.6s ease;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .game-word {
            font-size: 36px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 25px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .game-input {
            width: 100%;
            padding: 15px;
            font-size: 20px;
            border: 2px solid #ddd;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            box-sizing: border-box;
            transition: all 0.3s;
            -webkit-appearance: none;
            appearance: none;
            background: white;
            color: #333;
        }

        .game-input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .game-input.correct {
            border-color: #27ae60;
            background: #eafaf1;
            animation: flash-green 0.5s;
        }

        .game-input.incorrect {
            border-color: #e74c3c;
            background: #fadbd8;
            animation: shake 0.5s;
        }

        @keyframes flash-green {
            0%, 100% { background: white; }
            50% { background: #d5f4e6; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .submit-button {
            padding: 15px 40px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .submit-button:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .submit-button:active {
            transform: translateY(0);
        }

        .feedback-message {
            margin-top: 15px;
            font-size: 16px;
            min-height: 25px;
            font-weight: 500;
        }

        .feedback-message.correct {
            color: #27ae60;
        }

        .feedback-message.incorrect {
            color: #e74c3c;
        }

        .left-section.hidden {
            display: none;
        }

        .right-section.game-mode {
            flex-direction: row;
            justify-content: space-around;
            align-items: center;
            gap: 40px;
            padding: 40px;
        }

        .right-section.game-mode .safe-container {
            flex: 1;
            max-width: 500px;
        }

        .right-section.game-mode .game-panel {
            flex: 1;
            max-width: 500px;
        }

        @media (max-width: 1200px) {
            .right-section.game-mode {
                flex-direction: column;
                gap: 20px;
            }
            .right-section.game-mode .game-panel {
                margin-top: 20px;
            }
        }

        @media (max-width: 1024px) {
            .main-container {
                flex-direction: column;

                repeatGame: '🔄 Повторити з тим самим словником',
                newGame: '✨ Нова гра',

                speakTitle: 'Послухати вимову',
                speakAria: 'Відтворити вимову'

        const SPEECH_LANG = {
            en: 'en-GB',
            us: 'en-US',
            de: 'de-DE',
            es: 'es-ES',
            fr: 'fr-FR',
            ru: 'ru-RU',
            it: 'it-IT',
            sv: 'sv-SE',
            pt: 'pt-PT',
            pl: 'pl-PL',
            uk: 'uk-UA'
        };

        let currentLang = 'en';

        function getStrings() {
            return I18N[currentLang] || I18N.en;
        }

        function t(key, vars) {
            vars = vars || {};
            let s = getStrings()[key];
            if (s == null) return key;
            s = String(s);
            Object.keys(vars).forEach(k => {
                s = s.split('{' + k + '}').join(String(vars[k]));
            });
            return s;
        }

        function applyLanguage(lang) {
            if (!I18N[lang]) lang = 'en';
            currentLang = lang;
            try {
                localStorage.setItem('trezor-lang', lang);
            } catch (e) { /* ignore */ }

            document.documentElement.lang = lang;

            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });

            const pageTitleEl = document.getElementById('page-title');

            if (inst) inst.textContent = t('instructions');

            const thF = document.getElementById('vocab-th-foreign');
            if (thF) thF.textContent = t('foreignColumn');

            const addBtn = document.getElementById('add-row-btn');
            if (addBtn) addBtn.textContent = t('addRow');

            document.querySelectorAll('.czech-input').forEach(inp => {
                inp.placeholder = t('placeholderCzech');

                btn.title = t('removeRowTitle');

        // ── SPEECH ─────────────────────────────────────────────────────────────
        // iOS Safari načítá hlasy asynchronně a `voiceschanged` se nemusí spustit.
        // Řešení: hlasy načteme s opakovanými pokusy (polling) a uložíme do cache.

        let _voicesCache = [];
        let _voicesReady = false;

        function _loadVoices() {
            try {
                const v = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
                if (v && v.length > 0) {
                    _voicesCache = v;
                    _voicesReady = true;
                }
            } catch (e) {}
        }

        // Načti hned + znovu po události + polling (iOS fix)
        _loadVoices();
        if (window.speechSynthesis) {
            window.speechSynthesis.onvoiceschanged = _loadVoices;
            // Polling: zkus každých 200ms po dobu 3s (iOS iPod fix)
            let _pollCount = 0;
            const _pollInterval = setInterval(() => {
                _loadVoices();
                if (_voicesReady) {
                    clearInterval(_pollInterval);
                    updateVoiceSelector();
                } else if (++_pollCount > 15) {
                    clearInterval(_pollInterval);
                }
            }, 200);
        }

        // Kvalitní hlasy mají v názvu tato klíčová slova
        const QUALITY_KEYWORDS = ['enhanced', 'premium', 'natural', 'neural', 'wavenet', 'studio', 'polyglot'];

        function _scoreVoice(voice) {
            const name = (voice.name || '').toLowerCase();
            // Nejvyšší skóre = nejkvalitnější hlas
            if (QUALITY_KEYWORDS.some(k => name.includes(k))) return 3;
            if (voice.localService === false) return 2; // online hlasy bývají kvalitnější
            if (voice.localService === true) return 1;
            return 0;
        }

        function _findVoice(langCode) {
            const voices = _voicesCache;
            if (!voices.length) return null;
            const lc = langCode.toLowerCase();
            const base = lc.split('-')[0];

            // Filtruj kandidáty podle jazyka (přesná shoda → začátek → základní kód)
            let candidates = voices.filter(x => x.lang.toLowerCase() === lc);
            if (!candidates.length) candidates = voices.filter(x => x.lang.toLowerCase().startsWith(lc));
            if (!candidates.length) candidates = voices.filter(x => x.lang.toLowerCase().startsWith(base + '-'));
            if (!candidates.length) candidates = voices.filter(x => x.lang.toLowerCase() === base);
            if (!candidates.length) return null;

            // Seřaď podle kvality a vrať nejlepší
            candidates.sort((a, b) => _scoreVoice(b) - _scoreVoice(a));
            return candidates[0];
        }

        // Vrátí všechny dostupné hlasy pro daný jazyk seřazené podle kvality
        function _getVoicesForLang(langCode) {
            const voices = _voicesCache;
            if (!voices.length) return [];
            const lc = langCode.toLowerCase();
            const base = lc.split('-')[0];
            let candidates = voices.filter(x =>
                x.lang.toLowerCase() === lc ||
                x.lang.toLowerCase().startsWith(lc) ||
                x.lang.toLowerCase().startsWith(base + '-')
            );
            candidates.sort((a, b) => _scoreVoice(b) - _scoreVoice(a));
            return candidates;
        }

        let _selectedVoice = null; // uživatelem (nebo automaticky) vybraný hlas

        function updateVoiceSelector() {
            const row = document.getElementById('voice-selector-row');
            const sel = document.getElementById('voice-selector');
            const lbl = document.getElementById('voice-selector-label');

            const targetLang = SPEECH_LANG[currentLang] || 'en-US';
            const voices = _getVoicesForLang(targetLang);

            // Vždy nastav nejlepší dostupný hlas
            _selectedVoice = voices[0] || null;

            if (!row || !sel) return;

            if (voices.length <= 1) {
                row.style.display = 'none';
                return;
            }

            sel.innerHTML = '';
            voices.forEach((v, i) => {
                const opt = document.createElement('option');
                const quality = _scoreVoice(v) >= 3 ? ' ⭐' : _scoreVoice(v) >= 2 ? ' ✓' : '';
                opt.value = i;
                opt.textContent = v.name + quality;
                sel.appendChild(opt);
            });

            row.style.display = 'flex';
            sel.onchange = () => { _selectedVoice = voices[parseInt(sel.value)]; };

            const langNames = { en:'EN', us:'EN', de:'DE', es:'ES', fr:'FR', ru:'RU', it:'IT', sv:'SV', pt:'PT', pl:'PL', uk:'UA' };
            if (lbl) lbl.textContent = '🔊 ' + (langNames[currentLang] || '') + ' hlas:';
        }

        function speakForeignWord(text) {
            if (!text || !window.speechSynthesis) return;
            try {
                window.speechSynthesis.cancel();

                const targetLang = SPEECH_LANG[currentLang] || 'en-US';
                const utterance  = new SpeechSynthesisUtterance(text);
                utterance.rate   = 0.9;

                const doSpeak = () => {
                    // Aktualizuj výběr hlasu (nastaví _selectedVoice na nejlepší dostupný)
                    updateVoiceSelector();
                    const voice = _selectedVoice || _findVoice(targetLang);
                    if (voice) {
                        utterance.voice = voice;
                        utterance.lang  = voice.lang;
                    } else {
                        // Žádný hlas nenalezen — alespoň nastav lang, prohlížeč zkusí sám
                        utterance.lang = targetLang;
                    }
                    window.speechSynthesis.cancel();
                    window.speechSynthesis.speak(utterance);
                };

                if (_voicesReady) {
                    doSpeak();
                } else {
                    // Hlasy ještě nejsou načteny — počkej max 2s
                    utterance.lang = targetLang;
                    let attempts = 0;
                    const trySpeak = setInterval(() => {
                        _loadVoices();
                        if (_voicesReady || ++attempts > 10) {
                            clearInterval(trySpeak);
                            doSpeak();
                        }
                    }, 200);
                }
            } catch (e) {
                console.log('Speech error:', e);
            }
        }

        document.querySelector('.lang-switcher')?.addEventListener('click', (e) => {

        const MAX_ROWS = 20;

        const validationMessage = document.getElementById('validation-message');

        function createVocabRow() {
            const div = document.createElement('div');

            div.innerHTML = `
                <div class="vocab-col-foreign"><input type="text" class="english-input" inputmode="text" autocorrect="off" autocapitalize="none" spellcheck="false" /></div>
                <div class="vocab-col-czech"><input type="text" class="czech-input" inputmode="text" autocorrect="off" autocapitalize="none" spellcheck="false" /></div>
                <div class="vocab-col-del"><button class="remove-row" type="button">🗑️</button></div>
            `;

        function addVocabularyRow() {

        function updateRowCounter() {
            const rowCount = document.querySelectorAll('.english-input').length;
            rowCounterEl.textContent = `(${rowCount}/${MAX_ROWS} ${t('rows')})`;
        }

        function ensureRowCount(requiredCount) {
            while (document.querySelectorAll('.english-input').length < requiredCount &&
                   document.querySelectorAll('.english-input').length < MAX_ROWS) {
                addVocabularyRow();
            }

        function parseExcelRows(rawText) {
            return rawText
                .replace(/\r\n/g, '\n')
                .replace(/\r/g, '\n')
                .split('\n')
                .map(line => line.trim())
                .filter(Boolean)
                .map(line => line.split('\t'))
                .filter(parts => parts.length >= 2)
                .map(parts => ({
                    english: (parts[0] || '').trim(),
                    czech: (parts[1] || '').trim()
                }))
                .filter(item => item.english && item.czech);
        }

        function importExcelData(rawText, startIndex = 0) {
            const parsed = parseExcelRows(rawText);
            if (parsed.length === 0) return false;

            const cappedStartIndex = Math.max(0, Math.min(startIndex, MAX_ROWS - 1));
            const maxImportCount = MAX_ROWS - cappedStartIndex;
            const rowsToInsert = parsed.slice(0, maxImportCount);
            const requiredCount = cappedStartIndex + rowsToInsert.length;

            ensureRowCount(requiredCount);

            const engInputs = document.querySelectorAll('.english-input');
            const czInputs = document.querySelectorAll('.czech-input');

            rowsToInsert.forEach((row, offset) => {
                const rowIndex = cappedStartIndex + offset;
                if (engInputs[rowIndex] && czInputs[rowIndex]) {
                    engInputs[rowIndex].value = row.english;
                    czInputs[rowIndex].value = row.czech;
                }
            });

            updateRowCounter();
            updateLocks();
            addRowBtn.disabled = document.querySelectorAll('.english-input').length >= MAX_ROWS;
            return true;
        }

        function validateVocabulary() {
            const filledRows = [];
            
            const engInputs = document.querySelectorAll('.english-input');
            const czInputs = document.querySelectorAll('.czech-input');

            engInputs.forEach((engInput, index) => {
                const czInput = czInputs[index];
                
                if (engInput && czInput &&
                    engInput.value.trim() &&
                    czInput.value.trim()) {
                    filledRows.push({
                        english: engInput.value.trim(),
                        czech: czInput.value.trim()
                    });
                }
            });
            
            return filledRows;
        }

        function updateStartButton(lockCount) {
            const count = typeof lockCount === 'number'
                ? lockCount
                : validateVocabulary().length;

            if (count > 0) {
                startGameBtn.disabled = false;
                validationMessage.textContent = t('validationReady', { count });
                validationMessage.classList.remove('error');
                validationMessage.classList.add('success');
            } else {
                startGameBtn.disabled = true;
                validationMessage.textContent = t('validationEmpty');
                validationMessage.classList.remove('success');
                validationMessage.classList.add('error');
            }
        }

        function calculateLockPositions(count) {
            // Read ACTUAL rendered safe size — works on all screen sizes
            const safeDoorEl = document.getElementById('safe-door');
            const safeWidth  = safeDoorEl ? safeDoorEl.offsetWidth  : 400;
            const safeHeight = safeDoorEl ? safeDoorEl.offsetHeight : 500;

            // Lock size scales with safe: base 44px, min 24px
            const lockSize = Math.max(24, Math.min(44, Math.floor(safeWidth * 0.11)));
            const half = lockSize / 2;

            // Padding so locks never go outside safe
            const padX = lockSize * 0.9;
            const padY = lockSize * 0.9;
            const innerW = safeWidth  - 2 * padX;
            const innerH = safeHeight - 2 * padY;

            // Choose columns: 1 col up to 3, 2 cols up to 8, 3 cols up to 12, 4 cols up to 20
            let cols;
            if (count <= 3)       cols = 1;
            else if (count <= 8)  cols = 2;
            else if (count <= 12) cols = 3;
            else                  cols = 4;

            const rows = Math.ceil(count / cols);

            const positions = [];
            for (let i = 0; i < count; i++) {
                const col = i % cols;
                const row = Math.floor(i / cols);
                const x = padX + (cols > 1 ? (col / (cols - 1)) * innerW : innerW / 2) - half;
                const y = padY + (rows > 1 ? (row / (rows - 1)) * innerH : innerH / 2) - half;
                positions.push({ x, y, size: lockSize });
            }
            return positions;
        }

        function updateLocks() {
            const vocabulary = validateVocabulary();
            const lockCount = vocabulary.length;

            document.querySelectorAll('.lock').forEach(lock => lock.remove());

            if (lockCount === 0) {
                updateStartButton(0);
                return;
            }

            const positions = calculateLockPositions(lockCount);
            const safeDoor = document.getElementById('safe-door');

            for (let i = 1; i <= lockCount; i++) {
                const lock = document.createElement('div');
                lock.className = 'lock locked';
                lock.id = `lock-${i}`;
                lock.textContent = i;

                const pos = positions[i - 1];
                lock.style.left = `${pos.x}px`;
                lock.style.top  = `${pos.y}px`;
                // Apply dynamic size so locks always fit inside safe
                lock.style.width    = `${pos.size}px`;
                lock.style.height   = `${pos.size}px`;
                lock.style.fontSize = `${Math.max(9, Math.floor(pos.size * 0.38))}px`;

                if (safeDoor) {
                    safeDoor.appendChild(lock);
                }
            }

            updateStartButton(lockCount);
        }

        addRowBtn.addEventListener('click', function () {
            const rowCount = document.querySelectorAll('.english-input').length;

            if (rowCount < MAX_ROWS) {
                addVocabularyRow();
                updateRowCounter();
                updateLocks();
            }

            const newCount = document.querySelectorAll('.english-input').length;
            if (newCount >= MAX_ROWS) {
                this.disabled = true;
            }
        });

        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('remove-row')) {
                const rowCount = document.querySelectorAll('.english-input').length;

                if (rowCount > 1) {
                    const row = e.target.closest('tr');

                        updateRowCounter();
                        updateLocks();

        document.addEventListener('input', (e) => {

        document.addEventListener('paste', (e) => {
            const target = e.target;
            if (!target || !(target.classList?.contains('english-input') || target.classList?.contains('czech-input'))) {
                return;
            }

            const pastedText = e.clipboardData?.getData('text') || '';
            if (!pastedText.includes('\t') || !pastedText.includes('\n')) {
                return;
            }

            const allRows = Array.from(document.querySelectorAll('#vocab-rows tr'));
            const targetRow = target.closest('tr');
            const startIndex = Math.max(0, allRows.indexOf(targetRow));

            if (importExcelData(pastedText, startIndex)) {
                e.preventDefault();
            }
        });

        let gameVocabulary = [];
        let currentWord = null;
        let unlockedCount = 0;
        let incorrectWords = [];
        let correctWords = [];

        startGameBtn.addEventListener('click', startGame);

        function startGame() {
            gameVocabulary = validateVocabulary();
            
            if (gameVocabulary.length === 0) {
                alert(t('alertNoWords'));
                return;
            }
            
            unlockedCount = 0;
            incorrectWords = [];
            correctWords = [];
            
            document.querySelectorAll('.lock').forEach(lock => {
                lock.classList.remove('unlocked');
                lock.classList.add('locked');
            });
            
            const leftSection = document.querySelector('.left-section');

        function showNextWord() {
            const gameInput = document.getElementById('game-input');
            const feedbackMessage = document.getElementById('feedback-message');
            
            if (gameInput) {
                gameInput.value = '';
                gameInput.className = 'game-input';
                gameInput.focus();
            }
            
            if (feedbackMessage) {
                feedbackMessage.textContent = '';
                feedbackMessage.className = 'feedback-message';
            }
            
            if (incorrectWords.length > 0 && Math.random() < 0.4) {
                currentWord = incorrectWords.shift();
            } else {
                const availableWords = gameVocabulary.filter(w => !correctWords.includes(w));
                
                if (availableWords.length === 0) {
                    endGame();
                    return;
                }
                
                currentWord = availableWords[Math.floor(Math.random() * availableWords.length)];
            }
            
            const showEnglish = Math.random() < 0.5;
            const wordToShow = showEnglish ? currentWord.english : currentWord.czech;
            currentWord.isEnglish = showEnglish;
            
            const gameWord = document.getElementById('game-word');
            if (gameWord) {
                gameWord.textContent = wordToShow;
            }

        document.getElementById('submit-answer')?.addEventListener('click', checkAnswer);
        document.getElementById('game-input')?.addEventListener('keypress', (e) => {

        });

        function checkAnswer() {
            const gameInput = document.getElementById('game-input');
            const feedbackMessage = document.getElementById('feedback-message');
            
            if (!gameInput || !currentWord) return;
            
            const userAnswer = gameInput.value;
            const correctAnswer = currentWord.isEnglish
                ? currentWord.czech
                : currentWord.english;

            const normalizedUser = normalizeAnswer(userAnswer);
            const normalizedCorrect = normalizeAnswer(correctAnswer);

            if (normalizedUser === normalizedCorrect) {
                gameInput.className = 'game-input correct';
                if (feedbackMessage) {
                    feedbackMessage.textContent = t('correctFeedback');
                    feedbackMessage.className = 'feedback-message correct';
                }
                
                playSound(800, 200);
                unlockNextLock();
                
                if (!correctWords.includes(currentWord)) {
                    correctWords.push(currentWord);
                }
                
                incorrectWords = incorrectWords.filter(w => w !== currentWord);
                
                setTimeout(() => {
                    showNextWord();
                }, 1000);
                
            } else {
                gameInput.className = 'game-input incorrect';
                if (feedbackMessage) {
                    feedbackMessage.textContent = t('incorrectFeedback', { answer: correctAnswer });
                    feedbackMessage.className = 'feedback-message incorrect';
                }
                
                if (!incorrectWords.includes(currentWord) && !correctWords.includes(currentWord)) {
                    incorrectWords.push(currentWord);
                }
                
                setTimeout(() => {
                    showNextWord();
                }, 2000);
            }
        }

        function unlockNextLock() {
            const locks = document.querySelectorAll('.lock.locked');
            
            if (locks.length > 0) {
                locks[0].classList.remove('locked');
                locks[0].classList.add('unlocked');

        function endGame() {
            const gamePanel = document.getElementById('game-panel');
            if (gamePanel) {
                gamePanel.style.display = 'none';

            setTimeout(() => {
                const safeDoor = document.getElementById('safe-door');

            setTimeout(() => {

        function normalizeAnswer(str) {
            if (str == null || str === '') return '';
            let s = str.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
            s = s.toLowerCase();
            try {
                s = s.replace(/[^\p{L}\p{N}\s]/gu, '');
            } catch (e) {
                s = s.replace(/[^a-z0-9\u00c0-\u024f\u0400-\u04FF\s]/gi, '');
            }
            s = s.replace(/\s+/g, ' ').trim();
            return s;
        }

        // Shared AudioContext — created once and reused (iOS requires user gesture to unlock)
        let sharedAudioContext = null;

        function getAudioContext() {
            if (!sharedAudioContext) {
                sharedAudioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            // iOS Safari suspends context until user gesture — resume it
            if (sharedAudioContext.state === 'suspended') {
                sharedAudioContext.resume();
            }
            return sharedAudioContext;
        }

        // Unlock audio on first touch/click anywhere on page (iOS requirement)
        function unlockAudio() {
            getAudioContext();
            document.removeEventListener('touchstart', unlockAudio);
            document.removeEventListener('click', unlockAudio);
        }
        document.addEventListener('touchstart', unlockAudio, { once: true });
        document.addEventListener('click', unlockAudio, { once: true });

        function playSound(frequency, duration) {
            try {
                const audioContext = getAudioContext();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.value = frequency;
                oscillator.type = 'sine';
                
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration / 1000);
                
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + duration / 1000);
            } catch (e) {
                console.log('Audio not supported');
            }
        }

        function playFanfare() {
            const notes = [523, 659, 784, 1047];
            notes.forEach((freq, index) => {
                setTimeout(() => playSound(freq, 300), index * 250);
            });
        }

        function escapeHtml(str) {
            if (str == null) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function generatePoem() {
            const excelData = gameVocabulary.map(v => `${v.english}\t${v.czech}`).join('\n');
            
            // Remove existing overlay if any
            const existing = document.getElementById('scroll-overlay');
            if (existing) existing.remove();

            // Hide safe so its 3D transform doesn't bleed above fixed overlay (WebKit bug)
            const safeEl2 = document.getElementById('safe');
            if (safeEl2) safeEl2.style.visibility = 'hidden';

            // Create fullscreen overlay
            const overlay = document.createElement('div');
            overlay.className = 'scroll-overlay';
            overlay.id = 'scroll-overlay';
            overlay.innerHTML = `
                <div class="scroll" id="scroll">
                    <div class="scroll-content" id="scroll-content"></div>
                </div>`;
            document.body.appendChild(overlay);

            const scrollContent = document.getElementById('scroll-content');
            if (scrollContent) {
                scrollContent.innerHTML = `
                    <div class="scroll-title">${t('scrollTitle')}</div>
                    <div class="scroll-subtitle">${t('scrollSubtitle')}</div>
                    
                    <div class="scroll-words">
                        <h3>${t('vocabMastered')}</h3>
                        
                        <textarea id="excel-copy-area" style="position: absolute; left: -9999px;">${excelData}</textarea>
                        
                        <div class="excel-table">
                            <div class="excel-header">
                                <div class="excel-cell excel-cell-speak" aria-hidden="true">${currentLang === 'us' ? 'US' : (currentLang === 'en' ? 'GB' : '')}</div>
                                <div class="excel-cell">${t('foreignColumn')}</div>
                                <div class="excel-cell">Česky</div>
                            </div>
                            ${gameVocabulary.map((v, i) => `
                                <div class="excel-row">
                                    <div class="excel-cell excel-cell-speak">
                                        <button type="button" class="speak-btn" data-vocab-index="${i}" title="${escapeHtml(t('speakTitle'))}" aria-label="${escapeHtml(t('speakAria'))}">🔊</button>
                                    </div>
                                    <div class="excel-cell">${escapeHtml(v.english)}</div>
                                    <div class="excel-cell">${escapeHtml(v.czech)}</div>
                                </div>
                            `).join('')}
                        </div>
                        
                        <button class="copy-button" onclick="copyToExcel()">
                            ${t('copyExcel')}
                        </button>
                        <div id="copy-feedback" class="copy-hint"></div>
                    </div>
                    
                    <div class="button-container">
                        <button class="scroll-button repeat-button" onclick="repeatGame()">
                            ${t('repeatGame')}
                        </button>
                        <button class="scroll-button new-button" onclick="location.reload()">
                            ${t('newGame')}
                        </button>
                    </div>
                `;

                scrollContent.querySelectorAll('.speak-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const i = parseInt(btn.getAttribute('data-vocab-index'), 10);
                        if (!Number.isNaN(i) && gameVocabulary[i]) {
                            speakForeignWord(gameVocabulary[i].english);
                        }
                    });
                });
            }
        }

        function copyToExcel() {
            const textarea = document.getElementById('excel-copy-area');
            const feedback = document.getElementById('copy-feedback');
            
            if (textarea) {
                textarea.select();
                
                try {
                    document.execCommand('copy');
                    if (feedback) {
                        feedback.textContent = t('copySuccess');
                        feedback.style.color = '#27ae60';
                        
                        setTimeout(() => {
                            feedback.textContent = '';
                        }, 3000);
                    }
                } catch (err) {
                    if (feedback) {
                        feedback.textContent = t('copyFail');
                        feedback.style.color = '#e74c3c';
                    }
                }
            }
        }

        function repeatGame() {
            unlockedCount = 0;
            incorrectWords = [];
            correctWords = [];
            
            document.querySelectorAll('.lock').forEach(lock => {
                lock.classList.remove('unlocked');
                lock.classList.add('locked');
            });
            
            const scrollOverlay = document.getElementById('scroll-overlay');
            if (scrollOverlay) scrollOverlay.remove();
            // Restore safe visibility
            const safeEl3 = document.getElementById('safe');
            if (safeEl3) safeEl3.style.visibility = 'visible';
            
            const safeDoor = document.getElementById('safe-door');
            if (safeDoor) {
                safeDoor.classList.remove('open');
            }
            
            const gamePanel = document.getElementById('game-panel');
            if (gamePanel) {
                gamePanel.style.display = 'block';
            }
            
            showNextWord();
        }

        window.addEventListener('DOMContentLoaded', () => {
            try {
                const saved = localStorage.getItem('trezor-lang');
                if (saved && I18N[saved]) {
                    currentLang = saved;
                }
            } catch (e) { /* ignore */ }

            for (let i = 0; i < 3; i++) {
                addVocabularyRow();
            }

            applyLanguage(currentLang);

            const firstEng = document.querySelector('.english-input');
            if (firstEng) {
                firstEng.focus();
            }
        });
    </script>
</body>
</html>
